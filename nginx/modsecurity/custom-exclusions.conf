# Application-specific WAF exclusions
# Add rules here to suppress false positives for this application.
# Patterns: SecRuleRemoveById / SecRuleUpdateTargetById / ctl:ruleRemoveTargetByTag

# ── Google OAuth callback ─────────────────────────────────────────────────────
# The 'state' parameter is an opaque base64 blob that can contain characters
# matching SQL injection or XSS heuristics. Exclude it from those checks.
SecRule REQUEST_URI "@beginsWith /api/auth/google" \
  "id:10001, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:state, \
   ctl:ruleRemoveTargetByTag=attack-xss;ARGS:state"

# The 'code' parameter is a short-lived server-issued auth code, not user input.
SecRule REQUEST_URI "@beginsWith /api/auth/google" \
  "id:10002, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:code"

