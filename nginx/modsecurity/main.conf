# ModSecurity rule load order — sequence matters

# 1. Core engine settings (SecRuleEngine, body limits, audit log)
Include /etc/nginx/modsecurity/modsecurity.conf

# 2. OWASP CRS: default variable values (paranoia_level=1, anomaly thresholds, etc.)
Include /etc/nginx/modsecurity/crs/crs-setup.conf

# 3. CRS overrides: paranoia level 2, thresholds, allowed methods/content-types.
#    Loaded after crs-setup.conf so these values take precedence.
Include /etc/nginx/modsecurity/crs-config.conf

# 4. OWASP CRS detection rules (SQLi, XSS, RCE, LFI, RFI, protocol enforcement, …)
Include /etc/nginx/modsecurity/crs/rules/*.conf

# 5. Application-specific false-positive exclusions
Include /etc/nginx/modsecurity/custom-exclusions.conf
