# CRS tuning — overrides crs-setup.conf defaults.
# Loaded after crs-setup.conf so these values win.

# Paranoia Level 2: detects common injection patterns with low FP risk on clean JSON APIs.
# Raise to 3 for stricter checks; lower to 1 for maximum compatibility.
SecAction \
  "id:900000, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.paranoia_level=2, \
   setvar:tx.executing_paranoia_level=2"

# Anomaly score thresholds (block when cumulative rule score reaches this value)
# inbound 5:  block if total request anomaly score >= 5
# outbound 4: block if total response anomaly score >= 4
SecAction \
  "id:900110, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.inbound_anomaly_score_threshold=5, \
   setvar:tx.outbound_anomaly_score_threshold=4"

# Allowed HTTP methods
SecAction \
  "id:900200, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:'tx.allowed_methods=GET HEAD POST PUT PATCH DELETE OPTIONS'"

# Allowed request content types (includes multipart/form-data for image uploads)
SecAction \
  "id:900220, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |application/json| |text/xml| |application/xml|'"

# Per-file and total upload size limit: 10 MB
SecAction \
  "id:900300, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.max_file_size=10485760, \
   setvar:tx.combined_file_sizes=10485760"
