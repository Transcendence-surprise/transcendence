# ModSecurity v3 — core settings
# Engine mode is overridden by the entrypoint based on NODE_ENV:
#   production  → SecRuleEngine On          (blocks matching requests)
#   development → SecRuleEngine DetectionOnly (logs only, never blocks)
SecRuleEngine On

# Request body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Response body (disabled for performance; enable to detect data leakage)
SecResponseBodyAccess Off

# Temporary directories
SecTmpDir /tmp/modsecurity
SecDataDir /tmp/modsecurity
SecUploadDir /tmp/modsecurity
SecUploadKeepFiles Off

# Audit log — only log anomalies and blocked requests
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogFormat JSON
SecAuditLogType Serial

# Debug log (0 = off; set to 3-5 temporarily to trace rule hits)
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 0
