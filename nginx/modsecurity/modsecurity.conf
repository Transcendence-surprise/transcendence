# ModSecurity WAF — ft_transcendence
# Applied to /api/* traffic only; WebSocket and frontend traffic bypass WAF entirely.
#
# Engine modes (change and run `make build-nginx` to apply):
#   SecRuleEngine On           — enforce: block requests that match rules
#   SecRuleEngine DetectionOnly — log without blocking (use for testing rules)
#   SecRuleEngine Off          — disabled

SecRuleEngine On

# ── Body inspection ───────────────────────────────────────────────────────────

SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off

# ── Audit log ─────────────────────────────────────────────────────────────────

SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsecurity/audit.log

# ── Phase 1: request headers ──────────────────────────────────────────────────

# 900010  Reject requests with no Host header
SecRule &REQUEST_HEADERS:Host "@eq 0" \
  "id:900010,phase:1,deny,status:400,log,msg:'Missing Host header'"

# 900011  Only allow standard HTTP methods
SecRule REQUEST_METHOD "!@within GET HEAD POST PUT PATCH DELETE OPTIONS" \
  "id:900011,phase:1,deny,status:405,log,msg:'Disallowed HTTP method'"

# 900012  Content-Length, when present, must be a plain non-negative integer.
#         Empty string = header absent = ok; non-digit chars = malformed = block.
SecRule REQUEST_HEADERS:Content-Length "!@rx ^[0-9]*$" \
  "id:900012,phase:1,deny,status:400,log,msg:'Non-numeric Content-Length'"

# 900020  Block access to dotfiles and hidden paths (/.env, /.git/HEAD, …)
SecRule REQUEST_URI "@rx /\." \
  "id:900020,phase:1,deny,status:403,log,msg:'Access to hidden path or dotfile'"

# 900021  Block dangerous file extensions in the URL path
SecRule REQUEST_URI "@rx \.(php|asp|aspx|jsp|cgi|pl|py|sh|bash|env|git|sql|bak|swp|htaccess|htpasswd)(\?|$|/)" \
  "id:900021,phase:1,deny,status:403,log,msg:'Dangerous file extension in URI'"

# ── Phase 2: URL arguments and request body ───────────────────────────────────

# 900030  Directory traversal in URI or URL parameters
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (?i)(?:\.\./|\.\.%2f|%2e%2e%2f|%2e%2e/)" \
  "id:900030,phase:2,deny,status:400,log,msg:'Path traversal attempt',t:urlDecodeUni,t:lowercase"

# 900100  SQL injection — UNION SELECT
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?i)\bunion\b.{0,50}\bselect\b" \
  "id:900100,phase:2,deny,status:400,log,msg:'SQLi: UNION SELECT',t:urlDecodeUni,t:htmlEntityDecode"

# 900101  SQL injection — DML / DDL statements
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?i)\b(?:drop\s+table|insert\s+into|delete\s+from|update\s+\w+\s+set|create\s+table|alter\s+table|truncate\s+table)\b" \
  "id:900101,phase:2,deny,status:400,log,msg:'SQLi: DML or DDL statement',t:urlDecodeUni"

# 900102  SQL injection — comment sequences and dangerous built-in functions
SecRule ARGS|ARGS_NAMES "@rx (?i)(?:--|#|\/\*|\*\/|xp_\w+|exec\s*\(|char\s*\(|convert\s*\()" \
  "id:900102,phase:2,deny,status:400,log,msg:'SQLi: comment or built-in function',t:urlDecodeUni"

# 900200  XSS — script tags
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?i)<\s*script[\s/>]" \
  "id:900200,phase:2,deny,status:400,log,msg:'XSS: script tag',t:urlDecodeUni,t:htmlEntityDecode"

# 900201  XSS — javascript: URI scheme
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?i)javascript\s*:" \
  "id:900201,phase:2,deny,status:400,log,msg:'XSS: javascript: protocol',t:urlDecodeUni,t:htmlEntityDecode"

# 900202  XSS — inline DOM event-handler attributes
SecRule ARGS|ARGS_NAMES "@rx (?i)\bon(?:error|load|click|mouseover|focus|blur|keypress|submit|change|input|drag|drop|paste)\s*=" \
  "id:900202,phase:2,deny,status:400,log,msg:'XSS: event handler attribute',t:urlDecodeUni,t:htmlEntityDecode"

# 900300  OS command injection via shell metacharacters
SecRule ARGS|ARGS_NAMES "@rx (?i)[;&|`]\s*(?:ls|cat|rm|wget|curl|bash|sh|id|whoami|uname|pwd|chmod|chown)\b" \
  "id:900300,phase:2,deny,status:400,log,msg:'Command injection via shell metacharacter',t:urlDecodeUni"

# 900301  Null byte injection
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?:%00|\x00)" \
  "id:900301,phase:2,deny,status:400,log,msg:'Null byte injection'"
