# Security rules for ModSecurity

# Mode 1: Off mode (for development)
# SecRuleEngine Off

# Mode 2: Detection mode (for development)
# SecRuleEngine DetectionOnly

# Mode 3: Block mode (for production)
SecRuleEngine On

# After changing mode rebuild the container:
# docker compose restart nginx

SecRequestBodyAccess On
SecResponseBodyAccess Off

# Hardened defaults: deny by default in phase 1 and 2 when a rule matches.
SecDefaultAction "phase:1,log,deny,status:403"
SecDefaultAction "phase:2,log,deny,status:403"

# Request limits to reduce abuse surface while keeping common API payloads workable.
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject
SecRequestBodyJsonDepthLimit 64

# Audit log
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsecurity/audit.log

# Strict protocol sanity checks.
SecRule &REQUEST_HEADERS:Host "@eq 0" \
  "id:900010,phase:1,deny,status:400,log,msg:'Missing Host header'"

SecRule REQUEST_METHOD "!^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$" \
  "id:900011,phase:1,deny,status:405,log,msg:'Unsupported HTTP method'"

SecRule REQUEST_HEADERS:Content-Length "@rx [^0-9]" \
  "id:900012,phase:1,deny,status:400,log,msg:'Invalid Content-Length header'"

# Basic hardening defaults
SecRule REQUEST_HEADERS:Content-Type "^$" \
  "id:900001,phase:1,pass,log,msg:'Missing Content-Type header'"

SecRule REQUEST_URI "@rx ^/\." \
  "id:900100,phase:1,deny,status:403,log,msg:'Blocked hidden file access'"

# Example test rule (uncomment to block a request)
# SecRule REQUEST_URI "@contains /waf-test" \
#   "id:900002,phase:1,deny,status:403,msg:'WAF test block'"

