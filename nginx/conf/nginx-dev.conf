load_module /etc/nginx/modules/ngx_http_modsecurity_module.so;

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile on;
    server_tokens off;

    # Development HTTP server
    server {
        listen 80;
        listen 8080;
        listen [::]:8080;
        server_name _;

        # Security headers (same as prod for accurate local testing)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend routing
        location / {
          proxy_pass http://frontend:5173;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API routes → gateway (WAF in detection-only mode, see entrypoint)
        location /api/ {
            modsecurity on;
            modsecurity_rules_file /etc/nginx/modsecurity/main.conf;
            set $gateway_upstream http://gateway:3002;
            proxy_pass $gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSockets → game
        location /socket.io/ {
            set $game_upstream game:3003;
            proxy_pass http://$game_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
