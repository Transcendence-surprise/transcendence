services:

  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - path: ./.env
        required: false
    networks:
      - transcendence_net

  # === Backend Microservices ===

  gateway:
    build: ./backend/gateway
    container_name: gateway
    env_file:
      - path: ./.env
        required: false
    depends_on:
      core:
        condition: service_healthy
      game:
        condition: service_healthy
      auth:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://gateway:3002/api/health || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  core:
    build: ./backend/core
    container_name: core
    env_file:
      - path: ./.env
        required: false
    volumes:
      - images_data:/app/uploads
    depends_on:
      migration:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://core:3000/api/core/health || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  auth:
    build: ./backend/auth
    container_name: auth
    env_file:
      - path: ./.env
        required: false
    depends_on:
      migration:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://auth:3001/api/auth/health || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  game:
    build: ./backend/game
    container_name: game
    env_file:
      - path: ./.env
        required: false
    depends_on:
      migration:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://game:3003/api/game/health || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  # === Infrastructure ===

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    cap_add:
      - IPC_LOCK
    env_file:
      - path: ./.env
        required: false
    networks:
      - transcendence_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/health 2>/dev/null | grep -q '\"sealed\":false'"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  db:
    image: postgres:17-alpine
    container_name: db
    env_file:
      - path: ./.env
        required: false
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  migration:
    build: ./backend/migration
    container_name: migration
    env_file:
      - path: ./.env
        required: false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transcendence_net

  nginx:
    build: ./nginx
    container_name: nginx
    env_file:
      - path: ./.env
        required: false
    depends_on:
      - frontend
      - gateway
      - core
      - auth
      - game
      - db
    networks:
      - transcendence_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf ${FRONTEND_URL} > /dev/null || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 220s
      retries: 1

  healthchecker:
    image: alpine:3.23.3
    container_name: healthchecker
    depends_on:
      nginx:
        condition: service_healthy
      gateway:
        condition: service_healthy
    networks:
      - transcendence_net

networks:
  transcendence_net:

volumes:
  images_data:

